<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation Premium</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b3d2e,#1b5e20,#06281d);
color:white;
text-align:center;
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
border-radius:20px;
padding:25px;
max-width:800px;
margin:20px auto;
border:1px solid rgba(255,255,255,0.2);
}

/* TITLE */
h1{font-size:42px;margin:10px 0;}
h2{font-weight:300}

/* COUNTDOWN */
.timer{
font-size:24px;
color:#ffd700;
margin:15px 0;
}

/* BUTTON */
.btn{
display:inline-block;
padding:12px 18px;
margin:6px;
background:#c8a951;
color:black;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

/* GRID GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
.gallery{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="card">

<h2>بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ</h2>

<h1>Sayla & Saefuloh</h1>

<p>We Are Getting Married</p>

<div class="timer" id="countdown"></div>

<a class="btn" href="#detail">Detail Acara</a>

</div>

<div class="card" id="detail">

<p>
“Dan di antara tanda-tanda kekuasaan-Nya ialah Dia menciptakan pasangan untukmu…”
<br>(QS. Ar-Rum: 21)
</p>

<hr>

<h3>Akad Nikah</h3>
<p>9 Juli 2026 - Masjid Al Jabbar Bandung</p>

<a class="btn" target="_blank"
href="https://maps.google.com?q=Masjid Al Jabbar Bandung">
Lokasi
</a>

<!-- RSVP GOOGLE FORM -->
<a class="btn" target="_blank"
href="https://forms.gle/REPLACE_FORM_LINK">
RSVP Hadir
</a>

<!-- WHATSAPP BACKUP -->
<a class="btn" target="_blank"
href="https://wa.me/62XXXXXXXXXX">
WhatsApp
</a>

</div>

<!-- GALLERY -->
<div class="card">

<h3>Gallery</h3>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1523438097201-512ae7d59c7a">
<img src="https://images.unsplash.com/photo-1529634806980-85c3dd6d34ac">
<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">
</div>

</div>

<script>
let target=new Date("Jul 9, 2026 08:00:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let d=target-now;

let days=Math.floor(d/(1000*60*60*24));
let hours=Math.floor((d%(1000*60*60*24))/(1000*60*60));
let minutes=Math.floor((d%(1000*60*60))/(1000*60));
let seconds=Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+" Hari "+hours+" Jam "+minutes+" Menit "+seconds+" Detik";
},1000);
</script>

</body>
</html>
